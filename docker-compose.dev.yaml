---
services:
  serial-scale:
    volumes:
      - .:/app
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${HOST_PORT:-8080}:8000"
    devices:
      - "${SERIAL_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0"
    environment:
      - SCALE_ID=${SCALE_ID:-dev-scale}
      - PYTHONUNBUFFERED=1
    restart: "no"

